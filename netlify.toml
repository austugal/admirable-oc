[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/docs"
  to = "/resources.html"
  status = 301

[[redirects]]
  from = "/library"
  to = "/resources.html"
  status = 301

[[redirects]]
  from = "/tutorials"
  to = "/videos.html"
  status = 301
