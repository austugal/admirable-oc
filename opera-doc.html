<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script>
  (function() {
    var params = new URLSearchParams(window.location.search);
    var file = params.get('file');
    var body = document.getElementById('doc-body');
    var metaEl = document.getElementById('doc-meta');

    var allowed = [
      'README.md',
      'cutover-guide.md',
      'ideas-g3-continuous-pricing.md',
      'ssd-interface-service-account.md',
      'advance-deposit-city-tax-fiscal.md',
      'training-catalogue.md',
      'training-schedule-40h.md'
    ];

    if (!file || allowed.indexOf(file) === -1) {
      body.innerHTML = '<div class="doc-error"><strong>Document not found.</strong>The requested reference is not in the library. <br><br><a href="opera-library.html">Return to the library index</a>.</div>';
      document.title = 'Not found · Aperture OPERA Reference';
      return;
    }

    var rawUrl = 'https://raw.githubusercontent.com/austugal/opera-references/main/' + file;
    var ghUrl = 'https://github.com/austugal/opera-references/blob/main/' + file;

    fetch(rawUrl)
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(function(md) {
        marked.setOptions({ gfm: true, breaks: false, headerIds: true });
        body.innerHTML = marked.parse(md);

        var firstH1 = body.querySelector('h1');
        if (firstH1) {
          document.title = firstH1.textContent + ' · Aperture OPERA Reference';
        }

        metaEl.innerHTML = '<div class="doc-meta">' +
          '<span>Source: <a href="' + ghUrl + '" target="_blank" rel="noopener">' + file + ' on GitHub</a></span>' +
          '<span>Licence: CC BY-NC-SA 4.0</span>' +
        '</div>';
      })
      .catch(function(err) {
        body.innerHTML = '<div class="doc-error"><strong>Failed to load document.</strong>' + err.message + '<br><br>You can read it directly on <a href="' + ghUrl + '" target="_blank" rel="noopener">GitHub</a>.</div>';
      });
  })();
</script>
